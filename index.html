<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆河流 · Memory River</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════
   Memory River — 记忆河流 · CSS
   ══════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #0a0e1a;
  --bg-mid: #111827;
  --text-primary: rgba(255, 255, 255, 0.92);
  --text-secondary: rgba(255, 255, 255, 0.55);
  --text-muted: rgba(255, 255, 255, 0.3);
  --glass-bg: rgba(15, 20, 40, 0.75);
  --glass-border: rgba(255, 255, 255, 0.08);
  --gold: #f6c860;
  --blue: #60a5fa;
  --pink: #f472b6;
  --green: #6ee7b7;
  --purple: #a78bfa;
  --serif: 'Noto Serif SC', 'Songti SC', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  font-family: var(--sans);
  color: var(--text-primary);
}

/* ── Canvas ── */
#river-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}

/* ── Vignette ── */
.vignette {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 2;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(5, 8, 18, 0.7) 100%);
}

/* ── Header ── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 32px;
  z-index: 10;
  pointer-events: none;
}
.header-title {
  font-family: var(--serif);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(246, 200, 96, 0.3);
}
.header-title span {
  color: var(--text-secondary);
  font-weight: 400;
  margin-left: 8px;
  font-size: 0.85rem;
}
.header-count {
  font-size: 0.8rem;
  color: var(--text-secondary);
  background: var(--glass-bg);
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
}

/* ── Timeline ── */
.timeline {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  z-index: 10;
  display: flex;
  align-items: center;
  padding: 0 32px;
  background: linear-gradient(to top, rgba(5, 8, 18, 0.9) 0%, transparent 100%);
  overflow-x: auto;
  scrollbar-width: none;
}
.timeline::-webkit-scrollbar { display: none; }
.timeline-inner {
  display: flex;
  align-items: center;
  gap: 0;
  min-width: 100%;
  position: relative;
  height: 40px;
}
.timeline-marker {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  padding: 0 6px;
  transition: all 0.3s ease;
  flex-shrink: 0;
}
.timeline-marker::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: all 0.3s ease;
}
.timeline-marker.decade::before {
  width: 8px; height: 8px;
  background: var(--text-secondary);
}
.timeline-marker:hover::before {
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold);
  transform: scale(1.5);
}
.timeline-label {
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-top: 6px;
  opacity: 0;
  transition: opacity 0.3s ease;
  white-space: nowrap;
}
.timeline-marker.decade .timeline-label {
  opacity: 1;
  font-size: 0.7rem;
  color: var(--text-secondary);
}
.timeline-marker:hover .timeline-label {
  opacity: 1;
  color: var(--gold);
}
.timeline-tooltip {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 0.72rem;
  color: var(--text-primary);
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
  margin-bottom: 8px;
}
.timeline-marker:hover .timeline-tooltip { opacity: 1; }

/* ── Particle Tooltip ── */
.particle-tooltip {
  position: fixed;
  pointer-events: none;
  z-index: 100;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(16px);
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 0.82rem;
  color: var(--text-primary);
  font-family: var(--serif);
  max-width: 260px;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}
.particle-tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}
.particle-tooltip .date {
  font-family: var(--sans);
  font-size: 0.65rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ── Memory Modal ── */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(5, 8, 18, 0.6);
  backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
.modal-overlay.visible {
  opacity: 1;
  pointer-events: all;
}
.modal-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(24px) saturate(150%);
  border-radius: 20px;
  padding: 40px;
  max-width: 560px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  transform: scale(0.94) translateY(16px);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 1px rgba(255,255,255,0.1);
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.modal-overlay.visible .modal-card {
  transform: scale(1) translateY(0);
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.08);
  color: var(--text-secondary);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease;
}
.modal-close:hover {
  background: rgba(255,255,255,0.15);
  color: var(--text-primary);
}
.modal-card { position: relative; }
.modal-title {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-weight: 700;
  line-height: 1.6;
  margin-bottom: 12px;
  padding-right: 40px;
}
.modal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
  font-size: 0.75rem;
  color: var(--text-secondary);
}
.modal-meta-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.modal-content {
  font-family: var(--serif);
  font-size: 0.95rem;
  line-height: 2;
  color: rgba(255,255,255,0.82);
  margin-bottom: 20px;
  white-space: pre-wrap;
}
.modal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.modal-tag {
  font-size: 0.68rem;
  padding: 4px 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--glass-border);
  color: var(--text-secondary);
}
.modal-news {
  margin-top: 16px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  border: 1px solid var(--glass-border);
  font-size: 0.78rem;
  color: var(--text-secondary);
}
.modal-news-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.modal-audio {
  margin-top: 16px;
}
.modal-audio audio {
  width: 100%;
  height: 36px;
  border-radius: 18px;
  opacity: 0.8;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .header { padding: 16px 20px; }
  .header-title { font-size: 0.95rem; }
  .modal-card { padding: 28px 24px; border-radius: 16px; }
  .modal-title { font-size: 1.2rem; }
  .timeline { padding: 0 16px; }
}
</style>
</head>
<body>

<!-- Vignette overlay -->
<div class="vignette"></div>

<!-- River Canvas -->
<canvas id="river-canvas"></canvas>

<!-- Header -->
<header class="header">
  <div class="header-title" id="header-name"></div>
  <div class="header-count" id="header-count"></div>
</header>

<!-- Timeline -->
<div class="timeline" id="timeline">
  <div class="timeline-inner" id="timeline-inner"></div>
</div>

<!-- Particle Tooltip -->
<div class="particle-tooltip" id="particle-tooltip">
  <div class="title"></div>
  <div class="date"></div>
</div>

<!-- Memory Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card" id="modal-card">
    <button class="modal-close" id="modal-close">×</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-content" id="modal-content"></div>
    <div class="modal-tags" id="modal-tags"></div>
    <div class="modal-news" id="modal-news" style="display:none"></div>
    <div class="modal-audio" id="modal-audio" style="display:none"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   Memory River — 记忆河流 · JavaScript Engine
   ══════════════════════════════════════════════════════════════ */

// ─── DATA INJECTION POINT ───
// MEMOIR_DATA_INJECT_START
const MEMOIR_DATA = {
  subject: {
    name: "林怀远",
    birthYear: 1961
  },
  memories: [
    {
      id: "m001",
      title: "大院里的夏夜，父亲教我认北斗",
      date: { year: 1968, month: 7 },
      content: "那年夏天格外炎热，母亲在院子里铺了一张凉席。父亲指着天空，从北斗七星讲到银河，说每颗星星都是一个远方的太阳。蝉鸣声在耳边此起彼伏，萤火虫在墙角一闪一闪。那是我第一次感觉到宇宙的广阔，也第一次觉得自己如此渺小又如此安全——因为父亲就在身边。",
      location: "北京·东城区",
      mood: "温暖",
      tags: ["童年", "父亲", "星空"],
      audioSnippet: null,
      newsAnchor: "1968年，中国第一颗人造地球卫星计划启动研发"
    },
    {
      id: "m002",
      title: "高考恢复那年，我在煤油灯下看完了整本数学",
      date: { year: 1977, month: 10 },
      content: "十月的广播里传来恢复高考的消息，整个生产队都沸腾了。我翻出压在箱底六年的课本，纸页已经泛黄发脆。每天收工后借着煤油灯复习到深夜，手指被冻得通红也不愿停下。母亲默默给我留了一个煮鸡蛋，放在桌角。那盏摇曳的灯光，是我生命中最明亮的光。",
      location: "河北·承德",
      mood: "平静",
      tags: ["高考", "青春", "改变命运"],
      audioSnippet: null,
      newsAnchor: "1977年10月，教育部宣布恢复中断十一年的高考制度"
    },
    {
      id: "m003",
      title: "女儿出生那天，窗外正落着三月的小雪",
      date: { year: 1989, month: 3 },
      content: "护士抱出来一个小小的、红红的婴儿，哭声嘹亮得像要宣告什么大事。我接过她的时候手在抖，怕自己笨拙的大手伤到这个柔软的小生命。窗外飘着晚春的湿雪，落在玻璃上就融化了。我想，从此以后我的人生又多了一重意义。给她取名晓雪，纪念这个下雪的早晨。",
      location: "北京·海淀区",
      mood: "欢乐",
      tags: ["女儿", "新生", "春雪"],
      audioSnippet: null,
      newsAnchor: null
    },
    {
      id: "m004",
      title: "退休那天我一个人走了很远的路",
      date: { year: 2021, month: 6 },
      content: "办完手续已是下午，我没有叫车，沿着长安街一直往东走。六十年的人生，四十年的工作，忽然就结束了。路过天安门的时候想起第一次来北京，十八岁的自己背着一个帆布包，眼里全是光。如今光慢慢沉淀成了一种温和的暖色。我在护城河边坐了很久，看夕阳把水面染成金色。一切刚刚好。",
      location: "北京·东城区",
      mood: "平静",
      tags: ["退休", "回忆", "长安街"],
      audioSnippet: null,
      newsAnchor: null
    }
  ]
};
// MEMOIR_DATA_INJECT_END

// ─── Mood Color Map ───
const MOOD_COLORS = {
  '温暖': { r: 246, g: 200, b: 96 },   // warm gold
  '平静': { r: 96, g: 165, b: 250 },   // serene blue
  '欢乐': { r: 244, g: 114, b: 182 },  // joyful pink
  '忧伤': { r: 167, g: 139, b: 250 },  // melancholy purple
  '感恩': { r: 110, g: 231, b: 183 },  // grateful green
  '激动': { r: 251, g: 146, b: 60 },   // excited orange
  'default': { r: 200, g: 200, b: 220 }
};

function getMoodColor(mood) {
  return MOOD_COLORS[mood] || MOOD_COLORS['default'];
}

// ─── Ambient Palette (very desaturated white / pale gold / pale blue) ───
const AMBIENT_PALETTE = [
  { r: 255, g: 255, b: 255 }, // white
  { r: 246, g: 232, b: 188 }, // pale gold
  { r: 200, g: 220, b: 245 }, // pale blue
  { r: 230, g: 230, b: 240 }  // very pale lavender
];

// ─── Canvas Setup ───
const canvas = document.getElementById('river-canvas');
const ctx = canvas.getContext('2d');
let W, H;
let mouseX = -1000, mouseY = -1000;
let highlightYear = null;
let particles = [];          // memory particles (mid layer)
let ambientFar = [];         // far layer — tiny, slow, very dim
let ambientNear = [];        // near layer — small, faster, mesh-connected
let flowLines = [];          // subtle river-flow bezier guides
let animId;
let time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => {
  resize();
  initAmbient();
  initFlowLines();
});
resize();

// ─── Memory Particle Class (mid layer · brighter & breathing) ───
class Particle {
  constructor(memory, index, total) {
    this.memory = memory;
    this.index = index;
    // Position: distribute across river band (middle 60% of screen height)
    const riverTop = H * 0.22;
    const riverHeight = H * 0.5;
    this.baseY = riverTop + Math.random() * riverHeight;
    this.x = Math.random() * W;
    this.y = this.baseY;
    // Size based on content length (smaller than before: 2–6px)
    const len = memory.content ? memory.content.length : 50;
    this.radius = Math.min(2 + (len / 80) * 2.5, 6);
    this.baseRadius = this.radius;
    // Speed: slow drift
    this.speed = 0.04 + Math.random() * 0.08;
    // Oscillation: very gentle
    this.phase = Math.random() * Math.PI * 2;
    this.amplitude = 4 + Math.random() * 10;
    this.frequency = 0.08 + Math.random() * 0.12;
    // Color
    const c = getMoodColor(memory.mood);
    this.color = c;
    this.alpha = 0.7 + Math.random() * 0.2;
    this.baseAlpha = this.alpha;
    // Pulse (slow, subtle)
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.12 + Math.random() * 0.15;
    // Breathing glow (slow, distinguishes memory particles from ambient mist)
    this.breathPhase = Math.random() * Math.PI * 2;
    this.breathSpeed = 0.06 + Math.random() * 0.08;
    this.glowMul = 1;
    // Trail
    this.trail = [];
    this.maxTrail = 8;
    // Highlight state
    this.highlighted = false;
    this.targetAlpha = this.baseAlpha;
    this.targetRadius = this.baseRadius;
    // Has audio indicator
    this.hasAudio = !!memory.audioSnippet;
  }

  update(dt) {
    // Movement
    this.x += this.speed * dt * 0.06;
    if (this.x > W + 20) this.x = -20;
    // Oscillation
    this.y = this.baseY + Math.sin(this.phase + time * this.frequency * 10) * this.amplitude;
    this.phase += 0.002 * dt;
    // Pulse + breathing
    this.pulsePhase += this.pulseSpeed * dt * 0.01;
    this.breathPhase += this.breathSpeed * dt * 0.01;
    const pulse = 1 + Math.sin(this.pulsePhase) * 0.18;
    const breath = 1 + Math.sin(this.breathPhase) * 0.28;
    this.glowMul = breath;
    // Highlight check
    if (highlightYear !== null && this.memory.date.year === highlightYear) {
      this.highlighted = true;
      this.targetAlpha = 1.0;
      this.targetRadius = this.baseRadius * 1.8;
    } else {
      this.highlighted = false;
      this.targetAlpha = this.baseAlpha;
      this.targetRadius = this.baseRadius;
    }
    // Smooth lerp
    this.alpha += (this.targetAlpha - this.alpha) * 0.05;
    this.radius += (this.targetRadius * pulse - this.radius) * 0.08;
    // Mouse interaction: memory particles ATTRACT toward mouse (opposite of ambient)
    const dx = this.x - mouseX;
    const dy = this.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 180 && dist > 0.5) {
      const pull = (1 - dist / 180) * 0.45;
      this.x -= (dx / dist) * pull;
      this.y -= (dy / dist) * pull;
      this.alpha = Math.min(1, this.alpha + 0.25 * (1 - dist / 180));
      this.radius = Math.max(this.radius, this.baseRadius * 1.4);
    }
    // Trail
    this.trail.push({ x: this.x, y: this.y, alpha: this.alpha * 0.3 });
    if (this.trail.length > this.maxTrail) this.trail.shift();
  }

  draw(ctx) {
    const { r, g, b } = this.color;
    // Draw trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const a = t.alpha * (i / this.trail.length) * 0.4;
      const trailR = this.radius * (0.3 + 0.5 * (i / this.trail.length));
      ctx.beginPath();
      ctx.arc(t.x, t.y, trailR, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
      ctx.fill();
    }
    // Breathing outer glow — what distinguishes memories from ambient mist
    const glowR = this.radius * 4 * this.glowMul;
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
    gradient.addColorStop(0, `rgba(${r},${g},${b},${this.alpha * 0.55})`);
    gradient.addColorStop(0.5, `rgba(${r},${g},${b},${this.alpha * 0.15})`);
    gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
    // Draw core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha})`;
    ctx.fill();
    // Bright center
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${this.alpha * 0.85})`;
    ctx.fill();
    // Audio indicator
    if (this.hasAudio) {
      ctx.beginPath();
      ctx.arc(this.x + this.radius + 3, this.y - this.radius - 3, 1.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${this.alpha * 0.6})`;
      ctx.fill();
    }
  }

  containsPoint(px, py) {
    const dx = this.x - px;
    const dy = this.y - py;
    return Math.sqrt(dx * dx + dy * dy) < Math.max(this.radius * 3, 18);
  }
}

// ─── Ambient Particle (atmospheric mist · stardust · fireflies) ───
class AmbientParticle {
  constructor(layer) {
    this.layer = layer; // 'far' | 'near'
    // River band — far layer is more dispersed than near
    const riverTop = H * (layer === 'far' ? 0.15 : 0.2);
    const riverHeight = H * (layer === 'far' ? 0.7 : 0.6);
    this.baseY = riverTop + Math.random() * riverHeight;
    this.x = Math.random() * W;
    this.y = this.baseY;
    if (layer === 'far') {
      this.radius = 0.3 + Math.random() * 0.7;       // 0.3–1px
      this.speed = 0.03 + Math.random() * 0.05;      // very slow
      this.baseAlpha = 0.08 + Math.random() * 0.07;  // very dim
    } else { // near
      this.radius = 1 + Math.random() * 1.5;         // 1–2.5px
      this.speed = 0.3 + Math.random() * 0.2;        // faster
      this.baseAlpha = 0.2 + Math.random() * 0.2;    // brighter
    }
    this.alpha = this.baseAlpha;
    this.color = AMBIENT_PALETTE[Math.floor(Math.random() * AMBIENT_PALETTE.length)];
    this.phase = Math.random() * Math.PI * 2;
    this.amplitude = 4 + Math.random() * 14;
    this.frequency = 0.2 + Math.random() * 0.3;
    // Twinkle / flicker
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.twinkleSpeed = 0.4 + Math.random() * 1.2;
    // Velocity offsets for mouse scatter
    this.vx = 0;
    this.vy = 0;
  }

  update(dt) {
    // Base flow (left → right, same direction as the river)
    this.x += this.speed * dt * 0.06;
    if (this.x > W + 10) {
      this.x = -10;
      const top = H * (this.layer === 'far' ? 0.15 : 0.2);
      const h = H * (this.layer === 'far' ? 0.7 : 0.6);
      this.baseY = top + Math.random() * h;
    }
    // Gentle vertical drift (sinusoidal)
    this.phase += 0.0015 * dt;
    this.y = this.baseY + Math.sin(this.phase + time * this.frequency * 60) * this.amplitude + this.vy;
    // Twinkle / flicker
    this.twinklePhase += this.twinkleSpeed * dt * 0.01;
    const tw = 0.55 + 0.45 * (Math.sin(this.twinklePhase) * 0.5 + 0.5);
    this.alpha = this.baseAlpha * tw;
    // Mouse "parting the mist": near-layer ambient scatters away
    if (this.layer === 'near') {
      const dx = this.x - mouseX;
      const dy = this.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150 && dist > 0.1) {
        const force = (1 - dist / 150) * 1.6;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }
    }
    // Apply velocity & dampening
    this.x += this.vx;
    this.vx *= 0.92;
    this.vy *= 0.92;
  }

  draw(ctx) {
    const { r, g, b } = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${this.alpha})`;
    ctx.fill();
  }
}

// ─── River Flow Guide (subtle drifting bezier curves) ───
class FlowLine {
  constructor() { this.reset(true); }
  reset(initial) {
    this.y = H * 0.25 + Math.random() * H * 0.5;
    this.x = initial ? Math.random() * W : -120;
    this.length = 220 + Math.random() * 320;
    this.curveAmp = 30 + Math.random() * 60;
    this.speed = 0.05 + Math.random() * 0.07;
    this.alpha = 0.02 + Math.random() * 0.02;
    this.phase = Math.random() * Math.PI * 2;
  }
  update(dt) {
    this.x += this.speed * dt * 0.06;
    this.phase += 0.0008 * dt;
    if (this.x - this.length > W + 100) this.reset(false);
  }
  draw(ctx) {
    const x0 = this.x - this.length;
    const y0 = this.y;
    const cx1 = this.x - this.length * 0.66;
    const cy1 = this.y + Math.sin(this.phase) * this.curveAmp;
    const cx2 = this.x - this.length * 0.33;
    const cy2 = this.y - Math.sin(this.phase + 1) * this.curveAmp;
    const x1 = this.x;
    const y1 = this.y + Math.sin(this.phase + 2) * this.curveAmp * 0.5;
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.bezierCurveTo(cx1, cy1, cx2, cy2, x1, y1);
    ctx.strokeStyle = `rgba(180, 200, 230, ${this.alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ─── Initialize Particles ───
function initParticles() {
  particles = [];
  const memories = MEMOIR_DATA.memories;
  const count = Math.min(memories.length, 200);
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(memories[i], i, count));
  }
}

// ─── Initialize Ambient Layers ───
// Total ambient ≈ 290 + memory ≤ 200 = under 500 cap for smooth 60fps
function initAmbient() {
  ambientFar = [];
  ambientNear = [];
  const farCount = 220;  // far layer — tiny background mist
  const nearCount = 70;  // near layer — closer fireflies (mesh-connected)
  for (let i = 0; i < farCount; i++) ambientFar.push(new AmbientParticle('far'));
  for (let i = 0; i < nearCount; i++) ambientNear.push(new AmbientParticle('near'));
}

// ─── Initialize Flow Guide Lines ───
function initFlowLines() {
  flowLines = [];
  for (let i = 0; i < 5; i++) flowLines.push(new FlowLine());
}

// ─── Background Gradient Animation ───
let bgHue = 220;
function drawBackground() {
  bgHue += 0.01;
  if (bgHue > 260) bgHue = 220;
  const gradient = ctx.createLinearGradient(0, 0, W, H);
  gradient.addColorStop(0, `hsl(${bgHue}, 40%, 6%)`);
  gradient.addColorStop(0.5, `hsl(${bgHue + 15}, 35%, 8%)`);
  gradient.addColorStop(1, `hsl(${bgHue + 30}, 30%, 5%)`);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);
}

// ─── Constellation Connections (near ambient layer only · for performance) ───
function drawConnections() {
  const max = 60;
  const max2 = max * max;
  const arr = ambientNear;
  for (let i = 0; i < arr.length; i++) {
    const a = arr[i];
    for (let j = i + 1; j < arr.length; j++) {
      const b = arr[j];
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < max2) {
        const t = 1 - Math.sqrt(d2) / max;
        const alpha = 0.03 + 0.03 * t;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `rgba(200, 215, 235, ${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

// ─── Animation Loop (layered: bg → flow guide → far → memory → near → mesh) ───
let lastTime = performance.now();
function animate(now) {
  const dt = Math.min(now - lastTime, 32);
  lastTime = now;
  time += 0.001 * dt;

  drawBackground();

  // 1. River flow guide curves (deepest background)
  for (const f of flowLines) { f.update(dt); f.draw(ctx); }

  // 2. Far ambient layer — tiny dim stardust (parallax depth)
  for (const p of ambientFar) { p.update(dt); p.draw(ctx); }

  // 3. Memory particles (mid layer · breathing glow)
  for (const p of particles) { p.update(dt); p.draw(ctx); }

  // 4. Near ambient layer — brighter fireflies
  for (const p of ambientNear) { p.update(dt); p.draw(ctx); }

  // 5. Constellation mesh between near-layer ambient particles
  drawConnections();

  animId = requestAnimationFrame(animate);
}

// ─── Mouse Tracking ───
canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  // Check particle hover
  let found = null;
  for (let i = particles.length - 1; i >= 0; i--) {
    if (particles[i].containsPoint(mouseX, mouseY)) {
      found = particles[i];
      break;
    }
  }
  const tooltip = document.getElementById('particle-tooltip');
  if (found) {
    tooltip.querySelector('.title').textContent = found.memory.title;
    tooltip.querySelector('.date').textContent = `${found.memory.date.year}年${found.memory.date.month ? found.memory.date.month + '月' : ''}`;
    tooltip.style.left = (mouseX + 16) + 'px';
    tooltip.style.top = (mouseY - 50) + 'px';
    tooltip.classList.add('visible');
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.classList.remove('visible');
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('mouseleave', () => {
  mouseX = -1000;
  mouseY = -1000;
  document.getElementById('particle-tooltip').classList.remove('visible');
});

// ─── Click: Open Memory Detail ───
canvas.addEventListener('click', (e) => {
  const px = e.clientX, py = e.clientY;
  for (let i = particles.length - 1; i >= 0; i--) {
    if (particles[i].containsPoint(px, py)) {
      openModal(particles[i].memory);
      break;
    }
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  const touch = e.touches[0];
  const px = touch.clientX, py = touch.clientY;
  for (let i = particles.length - 1; i >= 0; i--) {
    if (particles[i].containsPoint(px, py)) {
      openModal(particles[i].memory);
      break;
    }
  }
});

// ─── Modal ───
function openModal(memory) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = memory.title;
  // Meta
  const meta = document.getElementById('modal-meta');
  let metaHTML = `<span class="modal-meta-item">📅 ${memory.date.year}年${memory.date.month ? memory.date.month + '月' : ''}</span>`;
  if (memory.location) metaHTML += `<span class="modal-meta-item">📍 ${memory.location}</span>`;
  if (memory.mood) metaHTML += `<span class="modal-meta-item">💭 ${memory.mood}</span>`;
  meta.innerHTML = metaHTML;
  // Content
  document.getElementById('modal-content').textContent = memory.content || '';
  // Tags
  const tagsEl = document.getElementById('modal-tags');
  if (memory.tags && memory.tags.length) {
    tagsEl.innerHTML = memory.tags.map(t => `<span class="modal-tag">#${t}</span>`).join('');
    tagsEl.style.display = 'flex';
  } else {
    tagsEl.style.display = 'none';
  }
  // News anchor
  const newsEl = document.getElementById('modal-news');
  if (memory.newsAnchor) {
    newsEl.innerHTML = `<div class="modal-news-label">时代锚点</div><div>${memory.newsAnchor}</div>`;
    newsEl.style.display = 'block';
  } else {
    newsEl.style.display = 'none';
  }
  // Audio
  const audioEl = document.getElementById('modal-audio');
  if (memory.audioSnippet) {
    audioEl.innerHTML = `<audio controls preload="none" src="${memory.audioSnippet}"></audio>`;
    audioEl.style.display = 'block';
  } else {
    audioEl.style.display = 'none';
  }
  overlay.classList.add('visible');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
  // Pause any playing audio
  const audio = document.querySelector('.modal-audio audio');
  if (audio) audio.pause();
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ─── Timeline ───
function buildTimeline() {
  const container = document.getElementById('timeline-inner');
  const currentYear = new Date().getFullYear();
  const startYear = MEMOIR_DATA.subject.birthYear;
  // Count memories per year
  const yearCounts = {};
  const yearFirstTitle = {};
  for (const m of MEMOIR_DATA.memories) {
    const y = m.date.year;
    yearCounts[y] = (yearCounts[y] || 0) + 1;
    if (!yearFirstTitle[y]) yearFirstTitle[y] = m.title;
  }
  let html = '';
  for (let y = startYear; y <= currentYear; y++) {
    const isDecade = y % 10 === 0;
    const count = yearCounts[y] || 0;
    const title = yearFirstTitle[y] || '';
    const tooltipText = count > 0 ? `${y}年 · ${count}段记忆 — ${title}` : `${y}年`;
    html += `<div class="timeline-marker ${isDecade ? 'decade' : ''}" data-year="${y}">
      <div class="timeline-tooltip">${tooltipText}</div>
      <span class="timeline-label">${isDecade || y === startYear ? y : ''}</span>
    </div>`;
  }
  container.innerHTML = html;
  // Hover events
  container.querySelectorAll('.timeline-marker').forEach(el => {
    el.addEventListener('mouseenter', () => {
      highlightYear = parseInt(el.dataset.year);
    });
    el.addEventListener('mouseleave', () => {
      highlightYear = null;
    });
  });
}

// ─── Header ───
function updateHeader() {
  const name = MEMOIR_DATA.subject.name;
  document.getElementById('header-name').innerHTML = `${name}<span>· 回忆录</span>`;
  document.getElementById('header-count').textContent = `${MEMOIR_DATA.memories.length} 段记忆`;
}

// ─── Init ───
function init() {
  updateHeader();
  buildTimeline();
  initParticles();
  initAmbient();
  initFlowLines();
  requestAnimationFrame(animate);
}

init();
</script>
</body>
